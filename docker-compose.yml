version: "3.9"

services:
  api:
    image: python:3.11-slim
    container_name: cyber-monitor-api
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: bash -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  dashboard:
    image: python:3.11-slim
    container_name: cyber-monitor-dashboard
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: bash -c "pip install -r requirements.txt && streamlit run dashboard/streamlit_app.py --server.address 0.0.0.0"